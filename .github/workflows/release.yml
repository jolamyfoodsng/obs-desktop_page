name: Desktop Builds

run-name: >-
  ${{
    startsWith(github.ref, 'refs/tags/') && format('OBS Plugin Installer {0}', github.ref_name)
    || github.event_name == 'workflow_dispatch' && 'OBS Plugin Installer manual build'
    || startsWith(github.event.head_commit.message, 'v') && format('OBS Plugin Installer {0}', github.event.head_commit.message)
    || format('OBS Plugin Installer build ({0})', github.ref_name)
  }}

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            platform: windows
            artifact_suffix: windows-x64
            bundles: nsis,msi
            default_update_bundle: nsis
          - os: ubuntu-latest
            label: Linux x64
            platform: linux
            artifact_suffix: linux-x64
            bundles: appimage,deb
            default_update_bundle: appimage
          - os: ubuntu-24.04-arm
            label: Linux ARM64
            platform: linux
            artifact_suffix: linux-arm64
            bundles: deb
            default_update_bundle: deb
          - os: macos-13
            label: macOS Intel
            platform: macos
            artifact_suffix: macos-x64
            bundles: app,dmg
            default_update_bundle: app
          - os: macos-14
            label: macOS Apple Silicon
            platform: macos
            artifact_suffix: macos-arm64
            bundles: app,dmg
            default_update_bundle: app

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release version metadata
        run: npm run check:release-version
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

      - name: Build Tauri release bundles
        run: npm run build:release -- --bundles ${{ matrix.bundles }}
        env:
          VITE_POSTHOG_PROJECT_KEY: ${{ vars.VITE_POSTHOG_PROJECT_KEY }}
          VITE_POSTHOG_API_HOST: ${{ vars.VITE_POSTHOG_API_HOST }}
          VITE_SUPPORT_API_BASE_URL: ${{ vars.VITE_SUPPORT_API_BASE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATE_BASE_URL: ${{ vars.TAURI_UPDATE_BASE_URL }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATE_BUNDLE_TYPE: ${{ matrix.default_update_bundle }}

      - name: Upload workflow artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: obs-plugin-installer-${{ matrix.artifact_suffix }}-${{ github.sha }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.sig

      - name: Upload release artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ format('OBS Plugin Installer {0}', github.ref_name) }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.sig

  publish-main-release:
    name: Publish main prerelease
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - build-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: obs-plugin-installer-*-${{ github.sha }}
          path: release-artifacts
          merge-multiple: true

      - name: Read prerelease metadata
        id: metadata
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          RELEASE_TAG="main-v${APP_VERSION}-build-${GITHUB_RUN_NUMBER}"
          RELEASE_NAME="OBS Plugin Installer v${APP_VERSION} build ${GITHUB_RUN_NUMBER}"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify prerelease assets exist
        run: |
          mapfile -t release_files < <(find release-artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.app.tar.gz' -o \
            -name '*.dmg' -o \
            -name '*.sig' \
          \))

          if [ "${#release_files[@]}" -eq 0 ]; then
            echo "No release assets were found in release-artifacts."
            exit 1
          fi

          printf 'Publishing %s release asset(s):\n' "${#release_files[@]}"
          printf ' - %s\n' "${release_files[@]}"

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.metadata.outputs.release_name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body: |
            Automated desktop release from `main`.

            Version: `${{ steps.metadata.outputs.app_version }}`
            Commit: `${{ github.sha }}`
            Short SHA: `${{ steps.metadata.outputs.short_sha }}`
            Branch: `${{ github.ref_name }}`
          fail_on_unmatched_files: false
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.app.tar.gz
            release-artifacts/**/*.dmg
            release-artifacts/**/*.sig
